{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Adam's Photo Journal{% endblock %}</title>
    
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="preload">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">

    {% block style %}
    <link rel="stylesheet" href="{% static 'journal/main.css' %}">
    {% endblock %}

    <style>
      body {
        width: 100vw;
      }

      .content {
        width: 420px;
        margin: auto;
        background-color: var(--main-bg);
        border-radius: 5px;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .navbar .nav-links .link {
        margin: 0px 10px 0px 10px;
      }

      .navbar .logo {
        font-size: 30px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
</head>
  <body>

    <div class="content">
      <div class="navbar">
        <a href="/" class="logo">adamsai.ch</span>
        <div class="nav-links">
          {% if user.is_authenticated %}
            <a href="/manage" class="link">manage</a>
            <a href="/logout" class="link">logout</a>
          {% else %}
            <a href="/login" class="link">login</a>
          {% endif %}
        </div>
      </div>

      {% block content %}

      {% endblock %}
    </div>

  </body>
</html>
